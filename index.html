```html
<script>

const proxy = "https://api.allorigins.win/raw?url=";

loadGames();

function getPlaceID(link){
    let match = link.match(/games\/(\d+)/);
    return match ? match[1] : null;
}

async function addGame(){
    let link = document.getElementById("gameLink").value;
    let category = document.getElementById("category").value;
    let placeId = getPlaceID(link);

    if(!placeId){
        alert("Link tidak valid");
        return;
    }

    try{

    // convert placeId → universeId
    let universeData = await fetch(proxy + encodeURIComponent(`https://apis.roblox.com/universes/v1/places/${placeId}/universe`))
    .then(res=>res.json());

    let universeId = universeData.universeId;

    // get thumbnail
    let thumb = await fetch(proxy + encodeURIComponent(`https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=256x256&format=Png`))
    .then(res=>res.json());

    let image = thumb.data[0].imageUrl;

    // get game name
    let gameData = await fetch(proxy + encodeURIComponent(`https://games.roblox.com/v1/games?universeIds=${universeId}`))
    .then(res=>res.json());

    let name = gameData.data[0].name;

    createGame(image, link, name, category);
    saveGame(image, link, name, category);

    }catch{
        alert("Gagal ambil data game 😢");
    }
}

function createGame(image, link, name, row){
    let div = document.createElement("div");
    div.className="game-card";

    div.innerHTML = `
        <img src="${image}">
        <p>${name}</p>
    `;

    div.onclick=function(){
        showPopup(image, link, name);
    }

    document.getElementById(row+"Row").appendChild(div);
}

function showPopup(image, link, name){
    document.getElementById("popup").style.display="block";
    document.getElementById("popupImg").src=image;
    document.getElementById("popupLink").href=link;
    document.getElementById("popupName").innerText=name;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

function saveGame(image, link, name, category){
    let games = JSON.parse(localStorage.getItem("games")) || [];
    games.push({image, link, name, category});
    localStorage.setItem("games", JSON.stringify(games));
}

function loadGames(){
    let games = JSON.parse(localStorage.getItem("games")) || [];
    games.forEach(g=>{
        createGame(g.image, g.link, g.name, g.category);
    });
}

</script>
